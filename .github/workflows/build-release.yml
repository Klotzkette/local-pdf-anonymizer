# Build and attach Windows/macOS executables to GitHub Releases.
# Triggered when a release is published, or manually via workflow_dispatch.

name: Release Build

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to attach builds to (e.g. v2.0.1)'
        required: true
        type: string

permissions:
  contents: write # needed to upload release assets

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: PDFAnonymizer-Windows-x64.zip
          - os: macos-latest
            artifact_name: PDFAnonymizer-macOS-x64.zip

    runs-on: ${{ matrix.os }}

    env:
      RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── System dependencies for ocrmypdf ──────────────────────────
      - name: Install system deps (macOS)
        if: runner.os == 'macOS'
        run: brew install tesseract ghostscript cmake

      - name: Install system deps (Windows)
        if: runner.os == 'Windows'
        run: choco install tesseract ghostscript -y

      - name: Refresh PATH (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Import-Module "$env:ChocolateyInstall\helpers\chocolateyProfile.psm1"
          refreshenv
          $gsPath = (Get-ChildItem "C:\Program Files\gs" -Recurse -Filter "gswin64c.exe" -ErrorAction SilentlyContinue | Select-Object -First 1).DirectoryName
          if ($gsPath) { echo "$gsPath" >> $env:GITHUB_PATH }
          $tessPath = "C:\Program Files\Tesseract-OCR"
          if (Test-Path $tessPath) { echo "$tessPath" >> $env:GITHUB_PATH }

      # ── Python ────────────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # ── Python dependencies ───────────────────────────────────────
      - name: Install Python deps (macOS)
        if: runner.os == 'macOS'
        env:
          CMAKE_ARGS: "-DGGML_METAL=on -DGGML_NATIVE=off"
          FORCE_CMAKE: "1"
        run: pip install --no-cache-dir -r requirements.txt

      - name: Install Python deps (Windows)
        if: runner.os == 'Windows'
        run: pip install -r requirements.txt

      # ── Build ─────────────────────────────────────────────────────
      - name: Build with PyInstaller
        run: pyinstaller build.spec --noconfirm --clean

      # ── Package ───────────────────────────────────────────────────
      - name: Create ZIP archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd dist
          Compress-Archive -Path toms_super_simple_pdf_anonymizer -DestinationPath PDFAnonymizer-Windows-x64.zip

      - name: Create ZIP archive (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          cd dist
          zip -r PDFAnonymizer-macOS-x64.zip toms_super_simple_pdf_anonymizer

      # ── Upload to release ─────────────────────────────────────────
      - name: Upload release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          gh release upload "${{ env.RELEASE_TAG }}"
          "dist/${{ matrix.artifact_name }}"
          --clobber
