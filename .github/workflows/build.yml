name: Build Windows & Mac

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build EXE with PyInstaller
        run: pyinstaller build.spec --noconfirm --clean

      - name: Verify build output
        run: |
          dir dist\toms_super_simple_pdf_anonymizer\
          dir dist\toms_super_simple_pdf_anonymizer\toms_super_simple_pdf_anonymizer.exe

      - name: Create ZIP for distribution
        run: |
          cd dist
          Compress-Archive -Path toms_super_simple_pdf_anonymizer -DestinationPath PDFAnonymizer-Windows.zip
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDFAnonymizer-Windows
          path: dist/PDFAnonymizer-Windows.zip

  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install build tools
        run: brew install cmake

      - name: Install dependencies
        env:
          CMAKE_ARGS: "-DGGML_METAL=OFF -DGGML_ACCELERATE=OFF -DGGML_BLAS=OFF -DGGML_NATIVE=OFF"
          FORCE_CMAKE: "1"
          CFLAGS: "-mcpu=generic"
          CXXFLAGS: "-mcpu=generic"
        run: |
          pip install --no-cache-dir -r requirements.txt

      - name: Build app with PyInstaller
        run: pyinstaller build.spec --noconfirm --clean

      - name: Create ZIP for distribution
        run: |
          cd dist && zip -r PDFAnonymizer-Mac.zip toms_super_simple_pdf_anonymizer

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDFAnonymizer-Mac
          path: dist/PDFAnonymizer-Mac.zip

  release:
    needs: [build-windows, build-macos]
    if: always() && needs.build-windows.result == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: PDFAnonymizer-Windows
          path: artifacts/

      - name: Download Mac artifact
        if: needs.build-macos.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: PDFAnonymizer-Mac
          path: artifacts/

      - name: Create or update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: PDF Anonymizer - Lokale KI-Anonymisierung
          body: |
            ## PDF Anonymizer - Lokale KI-Anonymisierung

            **Downloads:**
            - **Windows:** [PDFAnonymizer-Windows.zip](https://github.com/Klotzkette/local-pdf-anonymizer/releases/download/latest/PDFAnonymizer-Windows.zip) herunterladen, entpacken und starten
            - **Mac:** [PDFAnonymizer-Mac.zip](https://github.com/Klotzkette/local-pdf-anonymizer/releases/download/latest/PDFAnonymizer-Mac.zip) herunterladen, entpacken und starten

            Dieser Release wird bei jedem Push automatisch aktualisiert.

            ---

            ### Features
            - **3-Phasen Lade-Pipeline:** Strukturiertes Model-Loading (io → init → warmup) mit Progress-Events
            - **Page-Cache-Warming:** mincore-Check + posix_fadvise fuer optimales I/O
            - **Warm-Up Inference:** KV-Cache-Initialisierung beim Start (non-fatal)
            - **KI-Modell:** Qwen3.5-9B (GGUF Q4_K_M) - schnell und praezise
            - **Performance:** n_batch=1024, KV-Cache Q8_0, Thread-Split Optimierung
            - **Crash-Sicherheit:** Logging, Regex-Fallback, robuste Fehlerbehandlung
            - **Kompakt:** Kein torch/transformers noetig
            - **Kein API-Key noetig:** Keine Cloud, keine laufenden Kosten
            - **Datenschutz:** Keine Daten verlassen Ihr Geraet

            ### Erste Schritte
            1. Programm starten
            2. Unter Einstellungen das KI-Modell herunterladen (~6 GB, einmalig)
            3. PDF per Drag & Drop ablegen, Speicherort waehlen, fertig!

            ### Systemanforderungen
            - Windows 10/11 oder macOS 12+
            - Mindestens 8 GB RAM (16 GB empfohlen)
            - ~6 GB freier Speicherplatz fuer das KI-Modell
          files: |
            artifacts/*
