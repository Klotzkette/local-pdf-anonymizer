name: Build Windows & Mac

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build EXE with PyInstaller
        run: pyinstaller build.spec --noconfirm --clean

      - name: Verify build output
        run: |
          dir dist\toms_super_simple_pdf_anonymizer\
          dir dist\toms_super_simple_pdf_anonymizer\toms_super_simple_pdf_anonymizer.exe

      - name: Create ZIP for distribution
        run: |
          cd dist
          Compress-Archive -Path toms_super_simple_pdf_anonymizer -DestinationPath PDFAnonymizer-Windows.zip
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDFAnonymizer-Windows
          path: dist/PDFAnonymizer-Windows.zip

  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install build tools
        run: brew install cmake

      - name: Install dependencies
        env:
          CMAKE_ARGS: "-DGGML_METAL=OFF -DGGML_ACCELERATE=OFF -DGGML_BLAS=OFF"
          FORCE_CMAKE: "1"
        run: |
          pip install --no-cache-dir -r requirements.txt

      - name: Build app with PyInstaller
        run: pyinstaller build.spec --noconfirm --clean

      - name: Create ZIP for distribution
        run: |
          cd dist && zip -r PDFAnonymizer-Mac.zip toms_super_simple_pdf_anonymizer

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDFAnonymizer-Mac
          path: dist/PDFAnonymizer-Mac.zip

  release:
    needs: [build-windows, build-macos]
    if: always() && needs.build-windows.result == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: PDFAnonymizer-Windows
          path: artifacts/

      - name: Download Mac artifact
        if: needs.build-macos.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: PDFAnonymizer-Mac
          path: artifacts/

      - name: Create or update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "PDF Anonymizer - Download"
          make_latest: true
          body: |
            ## PDF Anonymizer – Lokale KI-Anonymisierung

            **Downloads:**
            - **Windows:** `PDFAnonymizer-Windows.zip` herunterladen, entpacken und starten
            - **Mac:** `PDFAnonymizer-Mac.zip` herunterladen, entpacken und starten

            Dieser Release wird bei jedem Push automatisch aktualisiert.

            ---
          files: |
            artifacts/*
